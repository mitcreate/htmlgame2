<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏎️ TURBO DASH 3D</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Orbitron', monospace; }
  #canvas { display: block; }

  #hud {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 10;
  }

  #speedometer {
    position: fixed; bottom: 30px; right: 30px;
    width: 140px; height: 140px;
    border: 3px solid #00ffcc;
    border-radius: 50%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.7);
    box-shadow: 0 0 20px #00ffcc55, inset 0 0 20px #00ffcc11;
  }
  #speedVal {
    font-size: 36px; font-weight: 900; color: #00ffcc;
    text-shadow: 0 0 10px #00ffcc;
    line-height: 1;
  }
  #speedLabel { font-size: 10px; color: #00ffcc99; letter-spacing: 2px; margin-top: 4px; }

  #score-box {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    text-align: center;
  }
  #score {
    font-size: 28px; font-weight: 900; color: #fff;
    text-shadow: 0 0 15px #ff6600, 0 0 30px #ff3300;
    letter-spacing: 4px;
  }
  #distance-label { font-size: 10px; color: #ff660099; letter-spacing: 3px; margin-top: 2px; }

  #lap-box {
    position: fixed; top: 20px; left: 20px;
    padding: 10px 18px;
    background: rgba(0,0,0,0.7);
    border: 1px solid #ff6600;
    border-radius: 6px;
    box-shadow: 0 0 10px #ff660044;
  }
  #lap-text { font-size: 11px; color: #ff6600; letter-spacing: 2px; }
  #lap-val { font-size: 22px; color: #fff; font-weight: 700; }

  #controls-box {
    position: fixed; top: 20px; right: 20px;
    padding: 10px 14px;
    background: rgba(0,0,0,0.7);
    border: 1px solid #444;
    border-radius: 6px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px; color: #888; line-height: 1.8;
  }
  #controls-box span { color: #00ffcc; font-weight: 700; }

  #overlay {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, #0a0a0a 0%, #111 50%, #0a0a1a 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    transition: opacity 0.5s;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }

  .title-glow {
    font-size: clamp(40px, 8vw, 80px);
    font-weight: 900; color: #fff;
    text-shadow: 0 0 20px #ff6600, 0 0 40px #ff3300, 0 0 80px #ff110066;
    letter-spacing: 8px;
    animation: pulse 2s ease-in-out infinite;
  }
  .subtitle {
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px; color: #ff6600;
    letter-spacing: 6px; margin: 10px 0 40px;
    opacity: 0.8;
  }
  @keyframes pulse {
    0%,100% { text-shadow: 0 0 20px #ff6600, 0 0 40px #ff3300; }
    50% { text-shadow: 0 0 30px #ff6600, 0 0 60px #ff3300, 0 0 100px #ff110099; }
  }

  .start-btn {
    padding: 16px 50px;
    font-family: 'Orbitron', monospace;
    font-size: 18px; font-weight: 700;
    color: #000; background: #00ffcc;
    border: none; border-radius: 4px;
    cursor: pointer; letter-spacing: 3px;
    box-shadow: 0 0 20px #00ffcc88;
    transition: all 0.2s; pointer-events: all;
  }
  .start-btn:hover {
    background: #fff; box-shadow: 0 0 30px #fff;
    transform: scale(1.05);
  }

  .hint {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px; color: #444;
    margin-top: 30px; letter-spacing: 2px;
  }

  #gameover {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.9);
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
  }
  #gameover.show { display: flex; }
  .go-title {
    font-size: 60px; font-weight: 900;
    color: #ff3300;
    text-shadow: 0 0 30px #ff3300;
    letter-spacing: 6px;
  }
  .go-score {
    font-size: 24px; color: #fff;
    margin: 20px 0 10px;
    font-family: 'Rajdhani', sans-serif;
    letter-spacing: 3px;
  }
  .go-score span { color: #00ffcc; font-size: 36px; font-weight: 700; }

  /* Mobile controls */
  #mobile-controls {
    position: fixed; bottom: 20px; left: 0; right: 0;
    display: none; justify-content: space-between;
    padding: 0 20px; z-index: 20;
    pointer-events: none;
  }
  .mob-btn {
    width: 80px; height: 80px;
    background: rgba(0,255,204,0.15);
    border: 2px solid #00ffcc88;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; cursor: pointer;
    pointer-events: all;
    user-select: none; -webkit-user-select: none;
    touch-action: none;
  }

  @media (max-width: 768px) {
    #mobile-controls { display: flex; }
    #controls-box { display: none; }
    #speedometer { width: 100px; height: 100px; bottom: 120px; }
    #speedVal { font-size: 26px; }
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="hud">
  <div id="score-box">
    <div id="score">0 m</div>
    <div id="distance-label">DISTANCE</div>
  </div>
  <div id="lap-box">
    <div id="lap-text">OBSTACLES</div>
    <div id="lap-val" id="lapVal">0</div>
  </div>
  <div id="speedometer">
    <div id="speedVal">0</div>
    <div id="speedLabel">KM/H</div>
  </div>
  <div id="controls-box">
    <span>← →</span> Steer<br>
    <span>↑</span> Accelerate<br>
    <span>↓</span> Brake<br>
    <span>SPACE</span> Boost
  </div>
</div>

<div id="mobile-controls">
  <div class="mob-btn" id="btnLeft">◀</div>
  <div style="display:flex;gap:10px">
    <div class="mob-btn" id="btnUp">▲</div>
    <div class="mob-btn" id="btnBoost">⚡</div>
  </div>
  <div class="mob-btn" id="btnRight">▶</div>
</div>

<div id="overlay">
  <div class="title-glow">TURBO DASH</div>
  <div class="subtitle">3D RACING</div>
  <button class="start-btn" onclick="startGame()">START ENGINE</button>
  <div class="hint">← → to steer &nbsp;|&nbsp; ↑ to accelerate &nbsp;|&nbsp; SPACE to boost</div>
</div>

<div id="gameover">
  <div class="go-title">CRASHED!</div>
  <div class="go-score">Distance: <span id="finalScore">0</span> m</div>
  <div class="go-score">Obstacles Dodged: <span id="finalLaps">0</span></div>
  <button class="start-btn" style="margin-top:20px" onclick="restartGame()">TRY AGAIN</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ===== SCENE SETUP =====
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000011, 0.018);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 200);
camera.position.set(0, 3.5, 8);
camera.lookAt(0, 0, 0);

// ===== LIGHTING =====
const ambient = new THREE.AmbientLight(0x111133, 0.5);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xffffff, 0.8);
sun.position.set(5, 10, 5);
sun.castShadow = true;
scene.add(sun);

// Neon lights
const neonL = new THREE.PointLight(0x00ffcc, 2, 20);
neonL.position.set(-8, 2, 0);
scene.add(neonL);
const neonR = new THREE.PointLight(0xff6600, 2, 20);
neonR.position.set(8, 2, 0);
scene.add(neonR);

const headlight = new THREE.SpotLight(0xffffff, 2, 30, Math.PI/6, 0.3);
headlight.position.set(0, 2, 2);
scene.add(headlight);

// ===== ROAD =====
const ROAD_WIDTH = 12;
const ROAD_SEGMENT_LEN = 40;
const NUM_SEGMENTS = 8;
const roadSegments = [];

function makeRoadSegment(z) {
  const g = new THREE.PlaneGeometry(ROAD_WIDTH, ROAD_SEGMENT_LEN);
  const m = new THREE.MeshLambertMaterial({ color: 0x111122 });
  const mesh = new THREE.Mesh(g, m);
  mesh.rotation.x = -Math.PI/2;
  mesh.position.set(0, -0.01, z);
  mesh.receiveShadow = true;
  scene.add(mesh);

  // Lane markings
  for (let i = -1; i <= 1; i += 2) {
    const lg = new THREE.PlaneGeometry(0.15, ROAD_SEGMENT_LEN);
    const lm = new THREE.MeshLambertMaterial({ color: 0x00ffcc, emissive: 0x00ffcc, emissiveIntensity: 0.5 });
    const line = new THREE.Mesh(lg, lm);
    line.rotation.x = -Math.PI/2;
    line.position.set(i * (ROAD_WIDTH/2 - 0.2), 0.001, z);
    scene.add(line);
    mesh.userData.lines = mesh.userData.lines || [];
    mesh.userData.lines.push(line);
  }

  // Center dashes
  for (let d = -ROAD_SEGMENT_LEN/2; d < ROAD_SEGMENT_LEN/2; d += 4) {
    const dg = new THREE.PlaneGeometry(0.1, 1.5);
    const dm = new THREE.MeshLambertMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.3 });
    const dash = new THREE.Mesh(dg, dm);
    dash.rotation.x = -Math.PI/2;
    dash.position.set(0, 0.001, z + d);
    scene.add(dash);
    mesh.userData.lines = mesh.userData.lines || [];
    mesh.userData.lines.push(dash);
  }

  return mesh;
}

for (let i = 0; i < NUM_SEGMENTS; i++) {
  roadSegments.push(makeRoadSegment(-i * ROAD_SEGMENT_LEN));
}

// Road borders / barriers
function makeBarrier(x, z) {
  const g = new THREE.BoxGeometry(0.4, 0.8, ROAD_SEGMENT_LEN);
  const m = new THREE.MeshLambertMaterial({ color: 0xff3300, emissive: 0xff3300, emissiveIntensity: 0.3 });
  const mesh = new THREE.Mesh(g, m);
  mesh.position.set(x, 0.4, z);
  scene.add(mesh);
  return mesh;
}
const barriers = [];
for (let i = 0; i < NUM_SEGMENTS; i++) {
  barriers.push(makeBarrier(-ROAD_WIDTH/2 - 0.2, -i*ROAD_SEGMENT_LEN));
  barriers.push(makeBarrier(ROAD_WIDTH/2 + 0.2, -i*ROAD_SEGMENT_LEN));
}

// Background city buildings
function makeBuilding(x, z) {
  const h = 5 + Math.random() * 20;
  const g = new THREE.BoxGeometry(2 + Math.random()*3, h, 2 + Math.random()*3);
  const colors = [0x111133, 0x112233, 0x221133, 0x112211];
  const m = new THREE.MeshLambertMaterial({ color: colors[Math.floor(Math.random()*colors.length)] });
  const mesh = new THREE.Mesh(g, m);
  mesh.position.set(x, h/2, z);
  scene.add(mesh);
  // windows
  const wg = new THREE.BoxGeometry(0.2, 0.2, 0.1);
  const wm = new THREE.MeshLambertMaterial({ color: 0xffff88, emissive: 0xffff88, emissiveIntensity: 0.8 });
  for (let wy = 1; wy < h; wy += 1.5) {
    if (Math.random() > 0.4) {
      const win = new THREE.Mesh(wg, wm);
      win.position.set(x + (Math.random()-0.5)*2, wy, z + 1.5);
      scene.add(win);
    }
  }
}

for (let z = 0; z > -NUM_SEGMENTS*ROAD_SEGMENT_LEN; z -= 10) {
  makeBuilding(-10 - Math.random()*8, z + Math.random()*5);
  makeBuilding(10 + Math.random()*8, z + Math.random()*5);
}

// Stars
const starGeo = new THREE.BufferGeometry();
const starPos = [];
for (let i = 0; i < 1500; i++) {
  starPos.push((Math.random()-0.5)*400, 20+Math.random()*80, (Math.random()-0.5)*400);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.2 });
scene.add(new THREE.Points(starGeo, starMat));

// ===== PLAYER CAR =====
function makeCarBody(color, emissive) {
  const group = new THREE.Group();

  // Main body
  const bodyG = new THREE.BoxGeometry(1.6, 0.5, 3.5);
  const bodyM = new THREE.MeshLambertMaterial({ color, emissive, emissiveIntensity: 0.2 });
  const body = new THREE.Mesh(bodyG, bodyM);
  body.position.y = 0.35;
  body.castShadow = true;
  group.add(body);

  // Cabin
  const cabG = new THREE.BoxGeometry(1.2, 0.45, 1.8);
  const cabM = new THREE.MeshLambertMaterial({ color: 0x223344, emissive: 0x001122, emissiveIntensity: 0.1 });
  const cab = new THREE.Mesh(cabG, cabM);
  cab.position.set(0, 0.8, -0.1);
  group.add(cab);

  // Wheels
  const wheelPositions = [[-0.85,-0.05,1.2],[0.85,-0.05,1.2],[-0.85,-0.05,-1.2],[0.85,-0.05,-1.2]];
  wheelPositions.forEach(([wx,wy,wz]) => {
    const wg = new THREE.CylinderGeometry(0.32, 0.32, 0.25, 16);
    const wm = new THREE.MeshLambertMaterial({ color: 0x111111 });
    const wheel = new THREE.Mesh(wg, wm);
    wheel.rotation.z = Math.PI/2;
    wheel.position.set(wx, wy, wz);
    group.add(wheel);
    // Rim
    const rg = new THREE.CylinderGeometry(0.18, 0.18, 0.27, 8);
    const rm = new THREE.MeshLambertMaterial({ color: 0xaaaaaa, emissive: 0x888888, emissiveIntensity: 0.3 });
    const rim = new THREE.Mesh(rg, rm);
    rim.rotation.z = Math.PI/2;
    rim.position.set(wx, wy, wz);
    group.add(rim);
  });

  // Headlights
  [[-0.5, 0.35, 1.76], [0.5, 0.35, 1.76]].forEach(([lx,ly,lz]) => {
    const lg = new THREE.BoxGeometry(0.3, 0.15, 0.05);
    const lm = new THREE.MeshLambertMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 1 });
    const light = new THREE.Mesh(lg, lm);
    light.position.set(lx, ly, lz);
    group.add(light);
  });

  // Taillights
  [[-0.5, 0.35, -1.76], [0.5, 0.35, -1.76]].forEach(([lx,ly,lz]) => {
    const lg = new THREE.BoxGeometry(0.3, 0.15, 0.05);
    const lm = new THREE.MeshLambertMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 1 });
    const light = new THREE.Mesh(lg, lm);
    light.position.set(lx, ly, lz);
    group.add(light);
  });

  return group;
}

const playerCar = makeCarBody(0x0088ff, 0x0044ff);
playerCar.position.set(0, 0.05, 0);
scene.add(playerCar);
headlight.target = playerCar;

// ===== OBSTACLES =====
const obstacles = [];
const obstacleColors = [0xff4400, 0xffaa00, 0xff0088, 0x88ff00];

function spawnObstacle(z) {
  const lane = (Math.floor(Math.random()*3) - 1) * 3.5;
  const color = obstacleColors[Math.floor(Math.random()*obstacleColors.length)];
  const car = makeCarBody(color, color);
  car.position.set(lane, 0.05, z);
  scene.add(car);
  obstacles.push({ mesh: car, lane, z, speed: 0.02 + Math.random()*0.05 });
}

for (let i = 0; i < 5; i++) spawnObstacle(-30 - i*25);

// ===== PARTICLES (boost effect) =====
const particles = [];
function spawnParticle(x, y, z, color) {
  const g = new THREE.SphereGeometry(0.1, 4, 4);
  const m = new THREE.MeshLambertMaterial({ color, emissive: color, emissiveIntensity: 1 });
  const p = new THREE.Mesh(g, m);
  p.position.set(x, y, z);
  scene.add(p);
  const vel = new THREE.Vector3((Math.random()-0.5)*0.1, Math.random()*0.1, 0.15 + Math.random()*0.2);
  particles.push({ mesh: p, vel, life: 1.0 });
}

// ===== GAME STATE =====
let gameRunning = false;
let distance = 0;
let dodged = 0;
let speed = 0;
let maxSpeed = 0.25;
let boost = false;
let boostCooldown = 0;
let carX = 0;
let carTilt = 0;
let worldZ = 0;

const keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

// Mobile
const btnLeft = document.getElementById('btnLeft');
const btnRight = document.getElementById('btnRight');
const btnUp = document.getElementById('btnUp');
const btnBoost = document.getElementById('btnBoost');
btnLeft.addEventListener('touchstart', e => { e.preventDefault(); keys['ArrowLeft'] = true; });
btnLeft.addEventListener('touchend', e => { e.preventDefault(); keys['ArrowLeft'] = false; });
btnRight.addEventListener('touchstart', e => { e.preventDefault(); keys['ArrowRight'] = true; });
btnRight.addEventListener('touchend', e => { e.preventDefault(); keys['ArrowRight'] = false; });
btnUp.addEventListener('touchstart', e => { e.preventDefault(); keys['ArrowUp'] = true; });
btnUp.addEventListener('touchend', e => { e.preventDefault(); keys['ArrowUp'] = false; });
btnBoost.addEventListener('touchstart', e => { e.preventDefault(); keys['Space'] = true; });
btnBoost.addEventListener('touchend', e => { e.preventDefault(); keys['Space'] = false; });

function startGame() {
  document.getElementById('overlay').classList.add('hidden');
  gameRunning = true;
}

function restartGame() {
  document.getElementById('gameover').classList.remove('show');
  // Reset
  distance = 0; dodged = 0; speed = 0; carX = 0; carTilt = 0; worldZ = 0;
  boostCooldown = 0; boost = false;
  playerCar.position.set(0, 0.05, 0);
  obstacles.forEach(o => scene.remove(o.mesh));
  obstacles.length = 0;
  particles.forEach(p => scene.remove(p.mesh));
  particles.length = 0;
  for (let i = 0; i < 5; i++) spawnObstacle(-30 - i*25);
  gameRunning = true;
}

function gameOver() {
  gameRunning = false;
  document.getElementById('finalScore').textContent = Math.floor(distance);
  document.getElementById('finalLaps').textContent = dodged;
  document.getElementById('gameover').classList.add('show');
}

// ===== COLLISION =====
function checkCollision() {
  for (const obs of obstacles) {
    const dx = Math.abs(playerCar.position.x - obs.mesh.position.x);
    const dz = Math.abs(worldZ - obs.mesh.position.z + obs.mesh.position.z); 
    // simple box collision in world
    const px = playerCar.position.x;
    const pz = 0;
    const ox = obs.mesh.position.x;
    const oz = obs.mesh.position.z;
    if (Math.abs(px - ox) < 1.4 && Math.abs(oz) < 3) {
      return true;
    }
  }
  return false;
}

// ===== ANIMATION =====
let lastTime = 0;
function animate(time) {
  requestAnimationFrame(animate);
  const dt = Math.min((time - lastTime) / 16.67, 3);
  lastTime = time;

  if (!gameRunning) { renderer.render(scene, camera); return; }

  // Input
  if (keys['ArrowUp']) speed = Math.min(speed + 0.005*dt, maxSpeed);
  else speed = Math.max(speed - 0.003*dt, 0.04);

  boost = keys['Space'] && boostCooldown <= 0;
  const currentSpeed = boost ? speed * 1.8 : speed;
  if (boost) boostCooldown = 180;
  if (boostCooldown > 0) boostCooldown -= dt;

  // Steer
  const steerSpeed = 0.08 * dt;
  if (keys['ArrowLeft']) {
    carX = Math.max(carX - steerSpeed, -4.5);
    carTilt = Math.min(carTilt + 0.05*dt, 0.2);
  } else if (keys['ArrowRight']) {
    carX = Math.min(carX + steerSpeed, 4.5);
    carTilt = Math.max(carTilt - 0.05*dt, -0.2);
  } else {
    carTilt *= 0.9;
  }

  playerCar.position.x = carX;
  playerCar.rotation.z = carTilt;
  playerCar.rotation.y = -carTilt * 0.5;

  // Wheel spin
  playerCar.children.forEach((c, i) => {
    if (i >= 2 && i < 6) c.rotation.x += currentSpeed * 0.5;
  });

  // Move world
  worldZ += currentSpeed * dt;
  distance += currentSpeed * dt * 5;

  // Road scroll
  roadSegments.forEach(seg => {
    seg.position.z += currentSpeed * dt;
    if (seg.userData.lines) seg.userData.lines.forEach(l => l.position.z += currentSpeed * dt);
    if (seg.position.z > ROAD_SEGMENT_LEN) {
      seg.position.z -= NUM_SEGMENTS * ROAD_SEGMENT_LEN;
      if (seg.userData.lines) seg.userData.lines.forEach(l => l.position.z -= NUM_SEGMENTS * ROAD_SEGMENT_LEN);
    }
  });
  barriers.forEach(b => {
    b.position.z += currentSpeed * dt;
    if (b.position.z > ROAD_SEGMENT_LEN) b.position.z -= NUM_SEGMENTS * ROAD_SEGMENT_LEN;
  });

  // Obstacle movement
  obstacles.forEach((obs, idx) => {
    obs.mesh.position.z += (currentSpeed + obs.speed) * dt;
    // Wheel spin
    obs.mesh.children.forEach((c, i) => { if (i >= 2 && i < 6) c.rotation.x += 0.05; });

    if (obs.mesh.position.z > 12) {
      obs.mesh.position.z = -80 - Math.random()*40;
      obs.mesh.position.x = (Math.floor(Math.random()*3) - 1) * 3.5;
      dodged++;
    }
  });

  // Collision
  obstacles.forEach(obs => {
    const dx = Math.abs(playerCar.position.x - obs.mesh.position.x);
    const dz = Math.abs(obs.mesh.position.z - 0);
    if (dx < 1.3 && dz < 3) {
      gameOver();
    }
  });

  // Boost particles
  if (boost && Math.random() > 0.4) {
    spawnParticle(carX + (Math.random()-0.5)*1.5, 0.3, -2, 0x00ffcc);
    spawnParticle(carX + (Math.random()-0.5)*1.5, 0.3, -2, 0xff6600);
  }

  // Update particles
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.life -= 0.04*dt;
    p.mesh.position.x += p.vel.x*dt;
    p.mesh.position.y += p.vel.y*dt;
    p.mesh.position.z += (p.vel.z + currentSpeed)*dt;
    p.mesh.scale.setScalar(p.life);
    if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i,1); }
  }

  // Camera follow
  camera.position.x += (carX * 0.3 - camera.position.x) * 0.08 * dt;
  camera.position.y = 3.5 + (boost ? 0.5 : 0);
  camera.lookAt(carX * 0.5, 0, -5);

  // Neon lights follow
  neonL.position.z = carX - 10;
  neonR.position.z = carX + 10;

  // HUD
  const kmh = Math.floor(currentSpeed / maxSpeed * 220);
  document.getElementById('speedVal').textContent = kmh;
  document.getElementById('score').textContent = Math.floor(distance) + ' m';
  document.getElementById('lap-val').textContent = dodged;

  // Speed color
  const hue = boost ? '#ff6600' : '#00ffcc';
  document.getElementById('speedVal').style.color = hue;
  document.getElementById('speedometer').style.borderColor = hue;
  document.getElementById('speedometer').style.boxShadow = `0 0 20px ${hue}55, inset 0 0 20px ${hue}11`;

  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});

animate(0);
</script>
</body>
</html>
