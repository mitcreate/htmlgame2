<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏎️ TURBO DASH — REALISTIC</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; font-family:'Orbitron',monospace; }
  canvas { display:block; }

  #hud { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; }

  /* Speed */
  #speedo {
    position:fixed; bottom:25px; right:25px;
    width:150px; height:150px; border-radius:50%;
    background:rgba(8,8,12,0.88);
    border:2px solid rgba(255,200,50,0.6);
    box-shadow:0 0 24px rgba(255,180,0,0.3), inset 0 0 30px rgba(0,0,0,0.8);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  #speedNum { font-size:42px; font-weight:900; color:#f5c518; line-height:1; text-shadow:0 0 12px #f5c51888; }
  #speedUnit { font-size:9px; letter-spacing:3px; color:#aa8800; margin-top:3px; }
  #gearBox {
    position:fixed; bottom:35px; right:195px;
    width:70px; height:70px; border-radius:8px;
    background:rgba(8,8,12,0.88); border:2px solid #444;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  #gearLabel { font-size:9px; color:#555; letter-spacing:2px; }
  #gearNum { font-size:30px; font-weight:900; color:#fff; }

  /* Score */
  #topHUD {
    position:fixed; top:0; left:0; right:0; height:60px;
    background:linear-gradient(to bottom, rgba(0,0,0,0.75), transparent);
    display:flex; align-items:center; justify-content:space-between;
    padding:0 24px;
  }
  .hud-card { background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.08); border-radius:6px; padding:6px 16px; text-align:center; }
  .hud-label { font-size:8px; letter-spacing:3px; color:#666; }
  .hud-val { font-size:18px; font-weight:700; color:#fff; }

  /* Boost bar */
  #boostWrap {
    position:fixed; bottom:28px; left:25px;
    width:180px;
  }
  #boostLabel { font-size:9px; letter-spacing:3px; color:#888; margin-bottom:5px; }
  #boostTrack { width:100%; height:8px; background:rgba(255,255,255,0.1); border-radius:4px; overflow:hidden; border:1px solid rgba(255,255,255,0.15); }
  #boostFill { height:100%; width:100%; background:linear-gradient(90deg,#ff6600,#ffcc00); border-radius:4px; transition:width 0.1s; }

  /* Overlay */
  #overlay {
    position:fixed; inset:0;
    background:linear-gradient(160deg,#050508,#0d0d14,#080810);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:100; transition:opacity 0.6s;
  }
  #overlay.hidden { opacity:0; pointer-events:none; }
  .logo { font-size:clamp(36px,7vw,76px); font-weight:900; letter-spacing:10px; color:#fff; text-shadow:0 0 40px #f5c51866; }
  .logo span { color:#f5c518; }
  .tagline { font-family:'Rajdhani',sans-serif; font-size:16px; letter-spacing:8px; color:#555; margin:8px 0 50px; text-transform:uppercase; }
  .btn { padding:15px 55px; font-family:'Orbitron',monospace; font-size:15px; font-weight:700; letter-spacing:4px; background:#f5c518; color:#000; border:none; border-radius:4px; cursor:pointer; box-shadow:0 0 30px rgba(245,197,24,0.4); transition:all 0.2s; pointer-events:all; }
  .btn:hover { background:#fff; box-shadow:0 0 50px rgba(255,255,255,0.5); transform:scale(1.04); }
  .controls-hint { margin-top:32px; font-family:'Rajdhani',sans-serif; font-size:13px; color:#333; letter-spacing:2px; line-height:2; text-align:center; }
  .controls-hint b { color:#666; }

  #gameover {
    position:fixed; inset:0; background:rgba(0,0,0,0.92);
    display:none; flex-direction:column; align-items:center; justify-content:center; z-index:100;
  }
  #gameover.show { display:flex; }
  .crash-txt { font-size:64px; font-weight:900; color:#ff3300; text-shadow:0 0 40px #ff3300; letter-spacing:6px; }
  .result-row { font-family:'Rajdhani',sans-serif; font-size:20px; color:#888; margin:8px 0; letter-spacing:3px; }
  .result-row span { color:#f5c518; font-size:28px; font-weight:700; }

  /* Mobile */
  #mob { position:fixed; bottom:20px; left:0; right:0; display:none; justify-content:space-between; align-items:flex-end; padding:0 16px; z-index:20; pointer-events:none; }
  .mbtn { width:75px; height:75px; border-radius:50%; background:rgba(255,255,255,0.07); border:2px solid rgba(255,255,255,0.18); display:flex; align-items:center; justify-content:center; font-size:26px; cursor:pointer; pointer-events:all; user-select:none; -webkit-user-select:none; touch-action:none; color:#fff; }
  @media(max-width:768px){ #mob{display:flex;} }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <div id="topHUD">
    <div class="hud-card"><div class="hud-label">DISTANCE</div><div class="hud-val" id="distVal">0 m</div></div>
    <div class="hud-card"><div class="hud-label">DODGED</div><div class="hud-val" id="dodgeVal">0</div></div>
    <div class="hud-card"><div class="hud-label">BEST</div><div class="hud-val" id="bestVal">0 m</div></div>
  </div>
  <div id="speedo"><div id="speedNum">0</div><div id="speedUnit">KM/H</div></div>
  <div id="gearBox"><div class="hud-label">GEAR</div><div id="gearNum">1</div></div>
  <div id="boostWrap">
    <div id="boostLabel">⚡ NITRO</div>
    <div id="boostTrack"><div id="boostFill"></div></div>
  </div>
  <div id="musicBtn" onclick="toggleMusic()" style="
    position:fixed; bottom:28px; left:220px;
    width:46px; height:46px; border-radius:50%;
    background:rgba(8,8,12,0.88); border:2px solid #444;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; pointer-events:all; font-size:20px;
    transition: border-color 0.3s, box-shadow 0.3s;
  " title="Toggle Music">🔇</div>
</div>

<div id="mob">
  <div class="mbtn" id="mL">◀</div>
  <div style="display:flex;flex-direction:column;gap:10px;align-items:center">
    <div class="mbtn" id="mBoost">⚡</div>
    <div class="mbtn" id="mUp">▲</div>
  </div>
  <div class="mbtn" id="mR">▶</div>
</div>

<div id="overlay">
  <div class="logo">TURBO <span>DASH</span></div>
  <div class="tagline">Realistic Edition</div>
  <button class="btn" onclick="startGame()">START RACE</button>
  <div class="controls-hint">
    <b>↑</b> Accelerate &nbsp; <b>← →</b> Steer &nbsp; <b>SPACE</b> Nitro Boost
  </div>
</div>

<div id="gameover">
  <div class="crash-txt">CRASH!</div>
  <div class="result-row">Distance: <span id="goDist">0</span> m</div>
  <div class="result-row">Cars Dodged: <span id="goDodge">0</span></div>
  <button class="btn" style="margin-top:28px" onclick="restartGame()">RETRY</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── RENDERER ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const W = window.innerWidth, H = window.innerHeight;
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputEncoding = THREE.sRGBEncoding;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a14);
scene.fog = new THREE.Fog(0x0a0a14, 60, 130);

const camera = new THREE.PerspectiveCamera(60, W/H, 0.1, 200);
camera.position.set(0, 4.5, 10);

window.addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});

// ── CANVAS TEXTURES ────────────────────────────────────────────────────────────
function makeRoadTexture() {
  const cv = document.createElement('canvas'); cv.width=512; cv.height=512;
  const ctx = cv.getContext('2d');
  ctx.fillStyle='#1a1a22'; ctx.fillRect(0,0,512,512);
  // asphalt noise
  for(let i=0;i<4000;i++){
    const x=Math.random()*512, y=Math.random()*512;
    const g=Math.floor(Math.random()*30+20);
    ctx.fillStyle=`rgb(${g},${g},${g+5})`;
    ctx.fillRect(x,y,2,2);
  }
  // lane lines (dashed white center)
  ctx.setLineDash([40,30]); ctx.lineWidth=4; ctx.strokeStyle='rgba(255,255,255,0.6)';
  ctx.beginPath(); ctx.moveTo(256,0); ctx.lineTo(256,512); ctx.stroke();
  // solid edge lines yellow
  ctx.setLineDash([]); ctx.lineWidth=6; ctx.strokeStyle='rgba(255,200,0,0.8)';
  ctx.beginPath(); ctx.moveTo(20,0); ctx.lineTo(20,512); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(492,0); ctx.lineTo(492,512); ctx.stroke();
  const tex = new THREE.CanvasTexture(cv);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(1, 6);
  return tex;
}

function makeSidewalkTexture() {
  const cv = document.createElement('canvas'); cv.width=256; cv.height=256;
  const ctx = cv.getContext('2d');
  ctx.fillStyle='#2a2a30'; ctx.fillRect(0,0,256,256);
  ctx.strokeStyle='#333'; ctx.lineWidth=1;
  for(let x=0;x<256;x+=32){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,256); ctx.stroke(); }
  for(let y=0;y<256;y+=32){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(256,y); ctx.stroke(); }
  const tex = new THREE.CanvasTexture(cv);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(3, 20);
  return tex;
}

function makeCarPaintTexture(hex) {
  const cv = document.createElement('canvas'); cv.width=128; cv.height=128;
  const ctx = cv.getContext('2d');
  const r=(hex>>16)&255, g=(hex>>8)&255, b=hex&255;
  const grad = ctx.createLinearGradient(0,0,128,128);
  grad.addColorStop(0,`rgb(${Math.min(r+60,255)},${Math.min(g+60,255)},${Math.min(b+60,255)})`);
  grad.addColorStop(0.5,`rgb(${r},${g},${b})`);
  grad.addColorStop(1,`rgb(${Math.max(r-40,0)},${Math.max(g-40,0)},${Math.max(b-40,0)})`);
  ctx.fillStyle=grad; ctx.fillRect(0,0,128,128);
  return new THREE.CanvasTexture(cv);
}

function makeWindowTexture() {
  const cv = document.createElement('canvas'); cv.width=64; cv.height=64;
  const ctx = cv.getContext('2d');
  const g=ctx.createLinearGradient(0,0,64,64);
  g.addColorStop(0,'rgba(100,150,200,0.9)'); g.addColorStop(1,'rgba(20,40,80,0.95)');
  ctx.fillStyle=g; ctx.fillRect(0,0,64,64);
  ctx.fillStyle='rgba(255,255,255,0.12)';
  ctx.fillRect(5,5,20,54); ctx.fillRect(30,5,10,54);
  return new THREE.CanvasTexture(cv);
}

function makeTireTexture() {
  const cv = document.createElement('canvas'); cv.width=128; cv.height=128;
  const ctx = cv.getContext('2d');
  ctx.fillStyle='#111'; ctx.fillRect(0,0,128,128);
  ctx.strokeStyle='#2a2a2a'; ctx.lineWidth=3;
  for(let y=0;y<128;y+=8){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(128,y); ctx.stroke(); }
  return new THREE.CanvasTexture(cv);
}

// Shared textures
const roadTex = makeRoadTexture();
const sidewalkTex = makeSidewalkTexture();
const tireTex = makeTireTexture();
const windowTex = makeWindowTexture();

// ── LIGHTING ────────────────────────────────────────────────────────────────────
const hemi = new THREE.HemisphereLight(0x3344aa, 0x112200, 0.4);
scene.add(hemi);

const sun = new THREE.DirectionalLight(0xfff8e8, 1.2);
sun.position.set(20, 30, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=0.5; sun.shadow.camera.far=200;
sun.shadow.camera.left=-40; sun.shadow.camera.right=40;
sun.shadow.camera.top=20; sun.shadow.camera.bottom=-20;
sun.shadow.bias=-0.001;
scene.add(sun);

// Street lamp lights (orange sodium)


// ── ROAD & ENVIRONMENT ─────────────────────────────────────────────────────────
const ROAD_W = 13;
const SEG_LEN = 50;
const NSEGS = 7;

const roadMat = new THREE.MeshStandardMaterial({ map:roadTex, roughness:0.85, metalness:0.05 });
const sidewalkMat = new THREE.MeshStandardMaterial({ map:sidewalkTex, roughness:0.9, metalness:0 });
const barrierMat = new THREE.MeshStandardMaterial({ color:0xcccccc, roughness:0.5, metalness:0.3 });
const concreteMat = new THREE.MeshStandardMaterial({ color:0x3a3a44, roughness:0.95, metalness:0 });

const roadSegs = [];
function makeSegment(z){
  const g = new THREE.PlaneGeometry(ROAD_W, SEG_LEN);
  const m = new THREE.Mesh(g, roadMat);
  m.rotation.x=-Math.PI/2; m.position.set(0,-0.01,z);
  m.receiveShadow=true; scene.add(m);

  // sidewalks
  [-1,1].forEach(s=>{
    const sg=new THREE.PlaneGeometry(4,SEG_LEN);
    const sw=new THREE.Mesh(sg, sidewalkMat);
    sw.rotation.x=-Math.PI/2; sw.position.set(s*(ROAD_W/2+2),0.04,z);
    sw.receiveShadow=true; scene.add(sw);
    m._sidewalks=m._sidewalks||[]; m._sidewalks.push(sw);
  });

  // kerbs
  [-1,1].forEach(s=>{
    const kg=new THREE.BoxGeometry(0.35,0.12,SEG_LEN);
    const k=new THREE.Mesh(kg, barrierMat);
    k.position.set(s*(ROAD_W/2+0.18),0.06,z);
    k.receiveShadow=true; k.castShadow=true; scene.add(k);
    m._sidewalks=m._sidewalks||[]; m._sidewalks.push(k);
  });

  return m;
}

for(let i=0;i<NSEGS;i++) roadSegs.push(makeSegment(-i*SEG_LEN));

// Ground plane
const groundG=new THREE.PlaneGeometry(300,500);
const groundM=new THREE.MeshStandardMaterial({color:0x151518,roughness:1});
const ground=new THREE.Mesh(groundG,groundM);
ground.rotation.x=-Math.PI/2; ground.position.set(0,-0.1,0);
scene.add(ground);

// ── BUILDINGS ─────────────────────────────────────────────────────────────────
function buildingTex(r,g,b){
  const cv=document.createElement('canvas'); cv.width=128; cv.height=256;
  const ctx=cv.getContext('2d');
  ctx.fillStyle=`rgb(${r},${g},${b})`; ctx.fillRect(0,0,128,256);
  for(let row=0;row<256;row+=16){
    for(let col=0;col<128;col+=20){
      if(Math.random()>0.35){
        const brightness=Math.random();
        if(brightness>0.6){ ctx.fillStyle='rgba(255,240,180,0.85)'; }
        else if(brightness>0.3){ ctx.fillStyle='rgba(150,180,255,0.5)'; }
        else { ctx.fillStyle='rgba(0,0,0,0.7)'; }
        ctx.fillRect(col+2,row+2,14,10);
      }
    }
  }
  return new THREE.CanvasTexture(cv);
}

// buildingTex used by buildCitySlot below

// ── SCROLLING CITY GROUPS ─────────────────────────────────────────────────────
// Each "slot" is a THREE.Group holding buildings + lamps for one z-strip.
// We recycle them like road segments.

const CITY_SLOT_LEN = 22;       // z-length per slot
const NCITY = 14;               // how many slots in the pool
const citySlots = [];           // array of { group, lightL, lightR }

function buildCitySlot(startZ) {
  const grp = new THREE.Group();

  // Left side building
  const wL=3+Math.random()*6, hL=8+Math.random()*35, dL=3+Math.random()*6;
  const xL=-ROAD_W/2-4-Math.random()*5;
  const rL=Math.floor(30+Math.random()*40), gL=Math.floor(30+Math.random()*40), bL=Math.floor(40+Math.random()*50);
  const geoL=new THREE.BoxGeometry(wL,hL,dL);
  const matL=new THREE.MeshStandardMaterial({map:buildingTex(rL,gL,bL),roughness:0.7,metalness:0.1});
  const meshL=new THREE.Mesh(geoL,matL); meshL.position.set(xL,hL/2,0); meshL.castShadow=true; meshL.receiveShadow=true; grp.add(meshL);
  // rooftop
  const rtLG=new THREE.BoxGeometry(wL*0.4,1.5,dL*0.4);
  const rtLM=new THREE.MeshStandardMaterial({color:0x222230,roughness:0.8});
  const rtL=new THREE.Mesh(rtLG,rtLM); rtL.position.set(xL,hL+0.75,0); grp.add(rtL);

  // Right side building
  const wR=3+Math.random()*6, hR=8+Math.random()*35, dR=3+Math.random()*6;
  const xR=ROAD_W/2+4+Math.random()*5;
  const rR=Math.floor(30+Math.random()*40), gR=Math.floor(30+Math.random()*40), bR=Math.floor(40+Math.random()*50);
  const geoR=new THREE.BoxGeometry(wR,hR,dR);
  const matR=new THREE.MeshStandardMaterial({map:buildingTex(rR,gR,bR),roughness:0.7,metalness:0.1});
  const meshR=new THREE.Mesh(geoR,matR); meshR.position.set(xR,hR/2,0); meshR.castShadow=true; meshR.receiveShadow=true; grp.add(meshR);
  const rtRG=new THREE.BoxGeometry(wR*0.4,1.5,dR*0.4);
  const rtRM=new THREE.MeshStandardMaterial({color:0x222230,roughness:0.8});
  const rtR=new THREE.Mesh(rtRG,rtRM); rtR.position.set(xR,hR+0.75,0); grp.add(rtR);

  // Antennas (random)
  if(Math.random()>0.5){
    const ag=new THREE.CylinderGeometry(0.05,0.05,3,6);
    const am=new THREE.MeshStandardMaterial({color:0x888888,metalness:0.8,roughness:0.3});
    const ant=new THREE.Mesh(ag,am); ant.position.set(xL+(Math.random()-0.5)*wL*0.3,hL+3,0); grp.add(ant);
  }

  // Street lamp LEFT
  const postM=new THREE.MeshStandardMaterial({color:0x888888,metalness:0.7,roughness:0.4});
  const postLG=new THREE.CylinderGeometry(0.07,0.1,8,8);
  const postL=new THREE.Mesh(postLG,postM); postL.position.set(-ROAD_W/2-1.5,4,0); postL.castShadow=true; grp.add(postL);
  const armLG=new THREE.CylinderGeometry(0.04,0.04,2.5,6);
  const armL=new THREE.Mesh(armLG,postM); armL.rotation.z=Math.PI/2; armL.position.set(-ROAD_W/2+0.7,7.8,0); grp.add(armL);
  const lampLG=new THREE.BoxGeometry(0.5,0.25,0.5);
  const lampLM=new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xff9944,emissiveIntensity:0.8});
  const lampL=new THREE.Mesh(lampLG,lampLM); lampL.position.set(-ROAD_W/2+1.9,7.8,0); grp.add(lampL);

  // Street lamp RIGHT
  const postRG=new THREE.CylinderGeometry(0.07,0.1,8,8);
  const postR=new THREE.Mesh(postRG,postM); postR.position.set(ROAD_W/2+1.5,4,0); postR.castShadow=true; grp.add(postR);
  const armRG=new THREE.CylinderGeometry(0.04,0.04,2.5,6);
  const armR=new THREE.Mesh(armRG,postM); armR.rotation.z=-Math.PI/2; armR.position.set(ROAD_W/2-0.7,7.8,0); grp.add(armR);
  const lampRG=new THREE.BoxGeometry(0.5,0.25,0.5);
  const lampR=new THREE.Mesh(lampRG,lampLM); lampR.position.set(ROAD_W/2-1.9,7.8,0); grp.add(lampR);

  // Point lights for lamps
  const plL=new THREE.PointLight(0xff9944,1.8,20,2);
  plL.position.set(-ROAD_W/2+1.9,7.8,0); scene.add(plL);
  const plR=new THREE.PointLight(0xff9944,1.8,20,2);
  plR.position.set(ROAD_W/2-1.9,7.8,0); scene.add(plR);

  grp.position.z = startZ;
  scene.add(grp);

  return { group:grp, lightL:plL, lightR:plR };
}

for(let i=0;i<NCITY;i++){
  citySlots.push(buildCitySlot(-i*CITY_SLOT_LEN));
}

// ── SKY / STARS ────────────────────────────────────────────────────────────────
const skyG=new THREE.SphereGeometry(150,16,8);
const skyMat=new THREE.MeshBasicMaterial({
  color:0x060610, side:THREE.BackSide
});
scene.add(new THREE.Mesh(skyG,skyMat));

const starBuf=new THREE.BufferGeometry();
const starPos=[]; const starCol=[];
for(let i=0;i<2000;i++){
  const theta=Math.random()*Math.PI*2, phi=Math.random()*Math.PI;
  starPos.push(140*Math.sin(phi)*Math.cos(theta), 140*Math.cos(phi), 140*Math.sin(phi)*Math.sin(theta));
  const c=Math.random(); starCol.push(c,c,Math.min(c+0.2,1));
}
starBuf.setAttribute('position',new THREE.Float32BufferAttribute(starPos,3));
starBuf.setAttribute('color',new THREE.Float32BufferAttribute(starCol,3));
const starMat=new THREE.PointsMaterial({size:0.25,vertexColors:true});
scene.add(new THREE.Points(starBuf,starMat));

// ── REALISTIC CAR ──────────────────────────────────────────────────────────────
function buildRealisticCar(paintHex){
  const g = new THREE.Group();

  // Materials
  const bodyTex=makeCarPaintTexture(paintHex);
  const bodyMat=new THREE.MeshStandardMaterial({map:bodyTex,roughness:0.25,metalness:0.7,envMapIntensity:1});
  const glassMat=new THREE.MeshStandardMaterial({map:windowTex,roughness:0.05,metalness:0.1,transparent:true,opacity:0.82});
  const chromeMat=new THREE.MeshStandardMaterial({color:0xcccccc,roughness:0.1,metalness:0.95});
  const rubberMat=new THREE.MeshStandardMaterial({color:0x111111,roughness:0.95,metalness:0});
  const tireMat=new THREE.MeshStandardMaterial({map:tireTex,roughness:0.9,metalness:0});
  const rimMat=new THREE.MeshStandardMaterial({color:0xaaaaaa,roughness:0.2,metalness:0.9});
  const headlightMat=new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xffffff,emissiveIntensity:1.5,roughness:0.05,metalness:0.1});

// ── AUDIO ENGINE ──────────────────────────────────────────────────────────────
let audioCtx = null, musicOn = false;
let masterGain, engineOsc, engineGain, bassOsc, bassGain;
let beatInterval = null, hihatInterval = null;
let dronePad = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.setValueAtTime(0.0, audioCtx.currentTime);
  masterGain.connect(audioCtx.destination);

  // ── ENGINE RUMBLE (sawtooth, pitch tied to speed)
  engineOsc = audioCtx.createOscillator();
  engineOsc.type = 'sawtooth';
  engineOsc.frequency.setValueAtTime(60, audioCtx.currentTime);
  engineGain = audioCtx.createGain();
  engineGain.gain.setValueAtTime(0.18, audioCtx.currentTime);
  const engineFilter = audioCtx.createBiquadFilter();
  engineFilter.type = 'lowpass'; engineFilter.frequency.value = 400;
  engineOsc.connect(engineFilter);
  engineFilter.connect(engineGain);
  engineGain.connect(masterGain);
  engineOsc.start();

  // ── BASS DRONE (sub bass pulse)
  bassOsc = audioCtx.createOscillator();
  bassOsc.type = 'triangle';
  bassOsc.frequency.setValueAtTime(55, audioCtx.currentTime);
  bassGain = audioCtx.createGain();
  bassGain.gain.setValueAtTime(0.22, audioCtx.currentTime);
  const bassFilter = audioCtx.createBiquadFilter();
  bassFilter.type = 'lowpass'; bassFilter.frequency.value = 200;
  bassOsc.connect(bassFilter);
  bassFilter.connect(bassGain);
  bassGain.connect(masterGain);
  bassOsc.start();

  // ── SYNTH PAD (atmospheric chord)
  dronePad = [];
  [130.8, 164.8, 196.0, 261.6].forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.06, audioCtx.currentTime);
    const filt = audioCtx.createBiquadFilter();
    filt.type = 'bandpass'; filt.frequency.value = freq * 1.5; filt.Q.value = 2;
    osc.connect(filt); filt.connect(g); g.connect(masterGain);
    osc.start();
    dronePad.push({ osc, gain: g });
  });

  startBeat();
}

function playKick(time) {
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(150, time);
  osc.frequency.exponentialRampToValueAtTime(40, time + 0.08);
  g.gain.setValueAtTime(0.6, time);
  g.gain.exponentialRampToValueAtTime(0.001, time + 0.25);
  osc.connect(g); g.connect(masterGain);
  osc.start(time); osc.stop(time + 0.25);
}

function playSnare(time) {
  // noise burst
  const bufSize = audioCtx.sampleRate * 0.12;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);
  const noise = audioCtx.createBufferSource();
  noise.buffer = buf;
  const noiseFilter = audioCtx.createBiquadFilter();
  noiseFilter.type = 'bandpass'; noiseFilter.frequency.value = 3000; noiseFilter.Q.value = 0.8;
  const noiseGain = audioCtx.createGain();
  noiseGain.gain.setValueAtTime(0.35, time);
  noiseGain.gain.exponentialRampToValueAtTime(0.001, time + 0.12);
  noise.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(masterGain);
  noise.start(time); noise.stop(time + 0.15);
}

function playHihat(time, accent) {
  const bufSize = audioCtx.sampleRate * 0.04;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);
  const noise = audioCtx.createBufferSource();
  noise.buffer = buf;
  const filt = audioCtx.createBiquadFilter();
  filt.type = 'highpass'; filt.frequency.value = 8000;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(accent ? 0.18 : 0.08, time);
  g.gain.exponentialRampToValueAtTime(0.001, time + 0.04);
  noise.connect(filt); filt.connect(g); g.connect(masterGain);
  noise.start(time); noise.stop(time + 0.05);
}

function playBassNote(freq, time, dur) {
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sawtooth'; osc.frequency.setValueAtTime(freq, time);
  const f = audioCtx.createBiquadFilter();
  f.type = 'lowpass'; f.frequency.value = 300;
  g.gain.setValueAtTime(0.0, time);
  g.gain.linearRampToValueAtTime(0.28, time + 0.02);
  g.gain.exponentialRampToValueAtTime(0.001, time + dur);
  osc.connect(f); f.connect(g); g.connect(masterGain);
  osc.start(time); osc.stop(time + dur + 0.05);
}

// Bass line pattern (notes in Hz)
const bassLine = [55, 55, 73.4, 55, 65.4, 55, 49, 55];
let beatStep = 0;
let BPM = 128;

function startBeat() {
  if (beatInterval) clearInterval(beatInterval);
  const step = () => {
    if (!musicOn || !audioCtx) return;
    const now = audioCtx.currentTime;
    const beatDur = 60 / BPM;
    const s = beatStep % 16;

    // Kick on 0, 4, 8, 12
    if (s === 0 || s === 4 || s === 8 || s === 12) playKick(now);
    // Snare on 4, 12
    if (s === 4 || s === 12) playSnare(now);
    // Hi-hat every step, accent on even
    playHihat(now, s % 2 === 0);
    // Bass line
    playBassNote(bassLine[s % 8], now, beatDur * 0.9);

    beatStep++;
    // Speed up BPM slightly with speed
    const targetBPM = 118 + Math.floor((speed / MAX_SPEED) * 40) + (boostActive ? 20 : 0);
    BPM += (targetBPM - BPM) * 0.1;
    beatInterval = setTimeout(step, (60000 / BPM) / 2); // 16th notes
  };
  beatInterval = setTimeout(step, 10);
}

function startMusic() {
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  musicOn = true;
  masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
  masterGain.gain.linearRampToValueAtTime(0.85, audioCtx.currentTime + 1.2);
  document.getElementById('musicBtn').textContent = '🔊';
  document.getElementById('musicBtn').style.borderColor = '#f5c518';
  document.getElementById('musicBtn').style.boxShadow = '0 0 12px #f5c51888';
  startBeat();
}

function stopMusic() {
  musicOn = false;
  if (audioCtx) {
    masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
    masterGain.gain.linearRampToValueAtTime(0.0, audioCtx.currentTime + 0.4);
  }
  if (beatInterval) { clearTimeout(beatInterval); beatInterval = null; }
  document.getElementById('musicBtn').textContent = '🔇';
  document.getElementById('musicBtn').style.borderColor = '#444';
  document.getElementById('musicBtn').style.boxShadow = 'none';
}

function toggleMusic() {
  if (!musicOn) startMusic(); else stopMusic();
}

// Update engine sound in loop
function updateAudio(effSpeed, boosting) {
  if (!audioCtx || !musicOn) return;
  const now = audioCtx.currentTime;
  const ratio = effSpeed / MAX_SPEED;
  // Engine pitch: 55 Hz idle → 280 Hz full speed
  const engineFreq = 55 + ratio * 225 + (boosting ? 60 : 0);
  engineOsc.frequency.setTargetAtTime(engineFreq, now, 0.08);
  engineGain.gain.setTargetAtTime(0.12 + ratio * 0.12, now, 0.1);
  // Bass drone pitch
  bassOsc.frequency.setTargetAtTime(50 + ratio * 30, now, 0.2);
  // Pad swell on boost
  if (dronePad) {
    dronePad.forEach(p => {
      p.gain.gain.setTargetAtTime(boosting ? 0.1 : 0.05, now, 0.3);
    });
  }
}

// ── LOOP ───────────────────────────────────────────────────────────────────────
let last=0;
function loop(t){
  requestAnimationFrame(loop);
  const dt=Math.min((t-last)/16.67,3); last=t;
  if(!running){ renderer.render(scene,camera); return; }

  // Speed
  if(keys['ArrowUp']||keys['ArrowDown']){
    if(keys['ArrowUp']) speed=Math.min(speed+0.006*dt, MAX_SPEED);
    else speed=Math.max(speed-0.01*dt,0);
  } else { speed=Math.max(speed-0.003*dt,0.05); }

  // Boost
  boostActive=keys['Space']&&boostEnergy>0;
  if(boostActive){ boostEnergy=Math.max(boostEnergy-0.012*dt,0); }
  else { boostEnergy=Math.min(boostEnergy+0.004*dt,1); }
  const effSpeed=boostActive?speed*1.75:speed;

  // Steer
  const steer=0.09*dt;
  if(keys['ArrowLeft']){ carX=Math.max(carX-steer,-5); carTilt=Math.min(carTilt+0.06*dt,0.22); }
  else if(keys['ArrowRight']){ carX=Math.min(carX+steer,5); carTilt=Math.max(carTilt-0.06*dt,-0.22); }
  else { carTilt*=0.88; }

  playerCar.position.x=carX;
  playerCar.rotation.z=carTilt*0.7;
  playerCar.rotation.y=-carTilt*0.3;

  // Wheel spin & steering
  if(playerCar._wheels){
    const spin=effSpeed*0.6*dt;
    playerCar._wheels.forEach((w,i)=>{
      w.rotation.x+=spin;
      if(i<2){ w.rotation.y = -carTilt*1.2; } // front steer
    });
  }

  // Road scroll
  roadSegs.forEach(seg=>{
    seg.position.z+=effSpeed*dt;
    if(seg._sidewalks) seg._sidewalks.forEach(s=>s.position.z+=effSpeed*dt);
    if(seg.position.z>SEG_LEN*1.5){
      seg.position.z-=NSEGS*SEG_LEN;
      if(seg._sidewalks) seg._sidewalks.forEach(s=>s.position.z-=NSEGS*SEG_LEN);
    }
  });

  // City scroll (buildings + lamps move with speed)
  const CITY_TOTAL = NCITY * CITY_SLOT_LEN;
  citySlots.forEach(slot => {
    slot.group.position.z += effSpeed * dt;
    slot.lightL.position.z += effSpeed * dt;
    slot.lightR.position.z += effSpeed * dt;
    if(slot.group.position.z > CITY_SLOT_LEN * 2) {
      slot.group.position.z -= CITY_TOTAL;
      slot.lightL.position.z -= CITY_TOTAL;
      slot.lightR.position.z -= CITY_TOTAL;
    }
  });

  // Obstacles
  obstaclePool.forEach(obs=>{
    obs.mesh.position.z+=(effSpeed+obs.relSpeed)*dt;
    if(obs.mesh._wheels){ obs.mesh._wheels.forEach(w=>{ w.rotation.x+=0.08*dt; }); }
    if(obs.mesh.position.z>14){
      obs.mesh.position.z=-100-Math.random()*50;
      obs.mesh.position.x=(Math.floor(Math.random()*3)-1)*4;
      dodged++;
    }
    // Collision
    const dx=Math.abs(playerCar.position.x-obs.mesh.position.x);
    const dz=Math.abs(obs.mesh.position.z);
    if(dx<1.5&&dz<3.2){ camShake=15; doGameOver(); }
  });

  // Distance
  distance+=effSpeed*dt*5;

  // Particles
  if(boostActive&&Math.random()>0.3){
    spawnParticle(carX-0.18+(Math.random()-0.5)*0.5, 0.22, -2.1, Math.random()>0.5?0xff8800:0x00ffdd);
  }
  if(Math.random()>0.94){ spawnSmoke(carX+(Math.random()-0.5)*1.2, 0.2, -2); }

  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.life-=(p.smoke?0.025:0.05)*dt;
    p.mesh.position.x+=p.vel.x*dt;
    p.mesh.position.y+=p.vel.y*dt;
    p.mesh.position.z+=(p.vel.z+effSpeed)*dt;
    p.mesh.scale.setScalar(p.life);
    if(p.smoke&&p.mesh.material) p.mesh.material.opacity=p.life*0.4;
    if(p.life<=0){ scene.remove(p.mesh); particles.splice(i,1); }
  }

  // Camera
  if(camShake>0){ camShake-=dt; }
  const shake=camShake>0?(Math.random()-0.5)*0.08*camShake:0;
  camera.position.x+=(carX*0.28-camera.position.x)*0.07*dt+shake;
  const targetY=4.5+(boostActive?0.8:0);
  camera.position.y+=(targetY-camera.position.y)*0.05*dt;
  camera.position.z=boostActive?11:10;
  camera.lookAt(carX*0.4, 0.5+shake, -8);

  // Headlight follow
  carHL.position.set(carX, 2.8, 3);
  carHLTarget.position.set(carX*0.5, 0, -25);

  // Neon road edge lights
  const t2=Date.now()*0.001;
  neonL.intensity=1.2+Math.sin(t2*3)*0.3;
  neonR.intensity=1.2+Math.sin(t2*3+Math.PI)*0.3;

  // HUD
  const kmh=Math.floor(effSpeed/MAX_SPEED*240);
  const gear=Math.min(Math.ceil(kmh/40)+1,6)||1;
  document.getElementById('speedNum').textContent=kmh;
  document.getElementById('gearNum').textContent=gear;
  document.getElementById('distVal').textContent=Math.floor(distance)+' m';
  document.getElementById('dodgeVal').textContent=dodged;
  document.getElementById('boostFill').style.width=(boostEnergy*100)+'%';
  document.getElementById('boostFill').style.background=boostActive?'linear-gradient(90deg,#ff3300,#ffcc00)':'linear-gradient(90deg,#ff6600,#ffcc00)';
  document.getElementById('speedNum').style.color=boostActive?'#ff8800':'#f5c518';

  // Audio update
  updateAudio(effSpeed, boostActive);

  renderer.render(scene,camera);
}

// Street lamp pulse lights added
const neonL=new THREE.PointLight(0xff6600,1.5,15);
neonL.position.set(-8,2,-5); scene.add(neonL);
const neonR=new THREE.PointLight(0xff6600,1.5,15);
neonR.position.set(8,2,-5); scene.add(neonR);

loop(0);
</script>
</body>
</html>
